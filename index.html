<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para a Minha Bebê 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    background:linear-gradient(135deg,#0f172a,#3b0764,#ec4899);
    overflow-x:hidden;
    overflow-y:auto;
    color:white;
    min-height:100vh;
    -webkit-overflow-scrolling:touch;
}
#stars{
    position:fixed;
    inset:0;
    z-index:-2;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle linear infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.2}
    50%{opacity:1}
}

/* CORAÇÕES */
.heart{
    position:fixed;
    bottom:-20px;
    color:rgba(255,255,255,.5);
    animation:floatUp linear infinite;
    z-index:-1;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:.6;
    }
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* INTRO */
#intro{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
}

.glass{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border-radius:35px;
    padding:60px 40px;
    width:90%;
    max-width:700px;
    box-shadow:0 10px 40px rgba(255,105,180,.2);
}

h1{
    font-size:3.5rem;
    margin-bottom:15px;
}

.subtitle{
    font-size:1.2rem;
    opacity:.9;
    margin-bottom:35px;
}

button{
    border:none;
    padding:18px 45px;
    border-radius:999px;
    font-size:1rem;
    background:linear-gradient(45deg,#ec4899,#8b5cf6);
    color:white;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 30px rgba(255,105,180,.3);
}

button:hover{
    transform:scale(1.08);
}

/* CARTINHA */
#letterModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.envelope{
    width:320px;
    height:220px;
    position:relative;
    cursor:pointer;
}

.envelope-body{
    position:absolute;
    inset:0;
    background:#fce7f3;
    border-radius:12px;
}

.flap{
    position:absolute;
    width:100%;
    height:120px;
    background:#f9a8d4;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top;
    transition:1s;
}

.letter-text{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    color:#be185d;
    font-weight:600;
}

/* SHOW */
#show{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:998;
}

.emoji{
    position:absolute;
    animation:rise linear forwards;
}

@keyframes rise{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}
#message{
    display:none;
    min-height:100vh;
    justify-content:flex-start;
    align-items:center;
    padding:30px 20px 80px;
    overflow-y:auto;
}
.card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border-radius:35px;
    padding:50px;
    width:100%;
    max-width:850px;
    line-height:2;
    box-shadow:0 10px 40px rgba(255,105,180,.25);
    max-height:none;
    overflow:visible;
}

.card h2{
    text-align:center;
    margin-bottom:20px;
    font-size:2.5rem;
}

#typed{
    white-space:pre-wrap;
    font-size:1.1rem;
}

.quote{
    margin-top:30px;
    text-align:center;
    font-style:italic;
    opacity:.9;
}

@media(max-width:768px){
    h1{
        font-size:2.3rem;
    }

    .card{
        padding:30px;
    }
}
</style>
</head>

<body>

<div id="stars"></div>

<section id="intro">
    <div class="glass">
        <h1>💖 Para a Minha Bebê 💖</h1>

        <p class="subtitle">
            Há algo muito especial escondido aqui para ti... ✨
        </p>

        <button onclick="showSurprise()">
            💌 Abrir Surpresa
        </button>
    </div>
</section>

<div id="letterModal">
    <div class="envelope" onclick="openLetter()">
        <div class="envelope-body"></div>
        <div class="flap" id="flap"></div>

        <div class="letter-text">
            💌 Clica para abrir 💌
        </div>
    </div>
</div>

<div id="show">
    <h2>✨ Uma surpresa especial... 💖</h2>
</div>

<section id="message">
    <div class="card">
        <h2>✨ Para Ti 💖</h2>

        <div id="typed"></div>

        <div class="quote">
            “Algumas pessoas entram na nossa vida do nada…  
            e tornam-se especiais. 💙”
        </div>
    </div>
</section>

<script>
// estrelas
for(let i=0;i<200;i++){
    const star=document.createElement('div');
    star.className='star';

    star.style.left=Math.random()*100+'vw';
    star.style.top=Math.random()*100+'vh';

    star.style.animationDuration=
        (Math.random()*4+2)+'s';

    document.getElementById('stars')
        .appendChild(star);
}

// corações
setInterval(()=>{
    const heart=document.createElement('div');

    heart.className='heart';
    heart.innerHTML='💖';

    heart.style.left=
        Math.random()*100+'vw';

    heart.style.fontSize=
        (Math.random()*25+15)+'px';

    heart.style.animationDuration=
        (Math.random()*5+5)+'s';

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);

},400);

// abrir surpresa
function showSurprise(){
    document.getElementById(
        'letterModal'
    ).style.display='flex';
}

// abrir cartinha
function openLetter(){

    document.getElementById('flap')
        .style.transform=
        'rotateX(180deg)';

    setTimeout(()=>{

        document.getElementById(
            'letterModal'
        ).style.display='none';

        startShow();

    },1000);
}

// mini show
function startShow(){

    const show=
        document.getElementById(
            'show'
        );

    show.style.display='flex';

    const emojis=[
        '💖','✨','🌸',
        '💕','🥹','💘'
    ];

    for(let i=0;i<50;i++){

        const emoji=
            document.createElement(
                'div'
            );

        emoji.className='emoji';

        emoji.innerHTML=
            emojis[
                Math.floor(
                    Math.random()*
                    emojis.length
                )
            ];

        emoji.style.left=
            Math.random()*100+'vw';

        emoji.style.fontSize=
            (Math.random()*35+20)+'px';

        emoji.style.animationDuration=
            (Math.random()*3+2)+'s';

        show.appendChild(emoji);
    }

    setTimeout(()=>{

        show.style.display='none';

        document.getElementById(
            'intro'
        ).style.display='none';

        document.getElementById(
            'message'
        ).style.display='flex';

        typeWriter();

    },4500);
}

// typewriter
function typeWriter(){

const text=
`Às vezes, a vida surpreende-nos das formas mais bonitas… 🌍✨

Conhecer-te naquela sexta-feira foi uma daquelas coincidências bonitas que aparecem do nada… mas acabam por se tornar especiais 💖

Mesmo em tão pouco tempo, mostraste um carinho, uma paciência e uma forma de me tratar que é difícil encontrar 🌸

Gosto da forma como falamos, da tua calma, do teu jeito, e da forma como me fazes sentir confortável 😌

Talvez seja cedo para dizer muita coisa… mas sei que és alguém especial ✨

Obrigado por seres tão doce, tão querida e tão tu 💕

Espero que esta amizade continue a crescer de uma forma bonita, leve e sincera 🤍`;

const target=
document.getElementById(
'typed'
);

let i=0;

function write(){

    if(i<text.length){

        target.innerHTML+=
        text.charAt(i)==='\n'
        ? '<br>'
        : text.charAt(i);

        i++;

        setTimeout(write,35);
    }
}

write();
}
</script>

</body>
</html>
```
